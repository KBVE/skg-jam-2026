name: Deploy to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

# Edit ITCH_TARGET to your itch.io "user/game" slug.
env:
  GODOT_VERSION: 4.7
  GODOT_RELEASE: stable
  ITCH_TARGET: kbve/skg-2026
  ITCH_CHANNEL: html5

concurrency:
  group: deploy-itch
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- 1. Build Godot web export ---
      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          BASE="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}"
          curl -L -o godot.zip   "${BASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          curl -L -o templates.tpz "${BASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          unzip -o godot.zip
          mv Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -o templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Export Godot game
        run: |
          mkdir -p public/godot
          godot --headless --path godot --import
          godot --headless --path godot --export-release "Web" ../public/godot/index.html

      # --- 2. Build Vite bundle ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Vite
        run: npm run build

      # --- 3. Upload to itch.io ---
      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -o butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push dist "${ITCH_TARGET}:${ITCH_CHANNEL}"
